name: Release Preflight

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-preflight.yml"
      - ".github/workflows/release.yml"
      - "scripts/build_windows_release_nuitka.ps1"
      - "app/version.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-main-branch:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure workflow runs only from main
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Release preflight must be run from the main branch."
            exit 1
          fi

      - name: Read app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
from pathlib import Path
ns = {}
exec(Path("app/version.py").read_text(encoding="utf-8"), ns)
print(ns["__version__"])
PY
)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::app/version.py must contain a semantic version."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

  build-windows-preflight:
    runs-on: windows-latest
    needs: verify-main-branch
    env:
      APP_VERSION: ${{ needs.verify-main-branch.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip uninstall -y onnxruntime-gpu
          python -m pip install onnxruntime
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.11.0 torchvision==0.26.0
          python -m pip install "nuitka>=2.7" "ordered-set>=4.1.0" "zstandard>=0.23.0"

      - name: Validate translations
        shell: pwsh
        run: |
          python scripts/compile_translations.py --check

      - name: Build Windows package with Nuitka
        shell: pwsh
        run: |
          ./scripts/build_windows_release_nuitka.ps1 -AppVersion "$env:APP_VERSION"

      - name: Upload preflight bundle
        uses: actions/upload-artifact@v4
        with:
          name: comic-translate-preflight-${{ needs.verify-main-branch.outputs.version }}-windows-x64
          path: build/nuitka/comic-translate.dist
          if-no-files-found: error
