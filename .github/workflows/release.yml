name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-main-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Only semantic version tags like vX.Y.Z are supported."
            exit 1
          fi
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure tagged commit is contained in main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Release tags are allowed only for commits already contained in origin/main."
            exit 1
          fi

  build-windows-release:
    runs-on: windows-latest
    needs: verify-main-tag
    env:
      APP_VERSION: ${{ needs.verify-main-tag.outputs.version }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip uninstall -y onnxruntime-gpu
          python -m pip install onnxruntime
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.11.0 torchvision==0.26.0
          python -m pip install "nuitka>=2.7" "ordered-set>=4.1.0" "zstandard>=0.23.0"

      - name: Validate translations
        shell: pwsh
        run: |
          python scripts/compile_translations.py --check

      - name: Build Windows package with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --low-memory `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --module-parameter=torch-disable-jit=no `
            --windows-console-mode=disable `
            --windows-icon-from-ico=resources/icons/icon.ico `
            --company-name="ComicLabs" `
            --product-name="Comic Translate" `
            --file-version="$env:APP_VERSION.0" `
            --product-version="$env:APP_VERSION" `
            --output-dir=build/nuitka `
            --output-filename=comic-translate `
            --include-windows-runtime-dlls=yes `
            --include-data-dir=resources=resources `
            --include-data-dir=music=music `
            comic.py

      - name: Stage release bundle
        shell: pwsh
        run: |
          $bundleDir = "build/release/comic-translate-$env:RELEASE_TAG-windows-x64"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item -Recurse -Force "build/nuitka/comic-translate.dist/*" $bundleDir
          Copy-Item -Force LICENSE $bundleDir
          Copy-Item -Force README.md $bundleDir
          Copy-Item -Force README_ko.md $bundleDir

      - name: Archive release bundle
        shell: pwsh
        run: |
          $bundleDir = "build/release/comic-translate-$env:RELEASE_TAG-windows-x64"
          $zipPath = "$bundleDir.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path "$bundleDir/*" -DestinationPath $zipPath

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/release/comic-translate-${{ github.ref_name }}-windows-x64.zip
