name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "hotfix/**"
      - "benchmarking/lab"
  pull_request:
    branches:
      - main
      - develop

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming policy
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          branch="$REF_NAME"
          if [[ "$branch" == "main" || "$branch" == "develop" ]]; then
            exit 0
          fi
          if [[ "$branch" == "benchmarking/lab" ]]; then
            exit 0
          fi
          if [[ "$branch" =~ ^(feature|fix|chore|hotfix)/[a-z0-9][a-z0-9._-]*$ ]]; then
            exit 0
          fi
          echo "::error::Invalid branch name: $branch"
          exit 1

  validate-pr-flow:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: branch-name
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate pull request branch flow
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: python scripts/validate_pr_flow.py --head "$HEAD_REF" --base "$BASE_REF"

  validate-main-docs:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: branch-name
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate main docs allowlist
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/validate_main_docs_policy.py --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA"

  validate:
    runs-on: ubuntu-latest
    needs: branch-name
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "packaging>=24.0"

      - name: Validate repo policy
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
        run: python scripts/validate_repo_policy.py --mode ci --branch "$REF_NAME" --base-branch "$BASE_REF"

      - name: Validate Python syntax
        run: python scripts/validate_changed_python.py --all

      - name: Headless smoke test
        run: python scripts/headless_smoke.py

      - name: Validate translations
        run: python scripts/compile_translations.py --check
