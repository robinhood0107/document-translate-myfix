name: CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming policy
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          branch="$REF_NAME"
          if [[ "$branch" == "main" || "$branch" == "develop" ]]; then
            exit 0
          fi
          if [[ "$branch" =~ ^release/[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            exit 0
          fi
          if [[ "$branch" =~ ^codex/(feature|fix|chore|hotfix)/[a-z0-9][a-z0-9._-]*$ ]]; then
            exit 0
          fi
          echo "::error::Invalid branch name: $branch"
          exit 1

  validate:
    runs-on: ubuntu-latest
    needs: branch-name
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "PySide6>=6.8.0" \
            "numpy>=2.2.6" \
            "pillow>=11.0.0" \
            "requests>=2.31.0" \
            "packaging>=24.0" \
            "keyring>=25.7.0" \
            "msgpack>=1.1.0" \
            "six>=1.16.0"

      - name: Validate repo policy
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: python scripts/validate_repo_policy.py --mode ci --branch "$REF_NAME"

      - name: Validate Python syntax
        run: python scripts/validate_changed_python.py --all

      - name: Headless smoke test
        run: python scripts/headless_smoke.py

      - name: Validate translations
        run: python scripts/compile_translations.py --check
