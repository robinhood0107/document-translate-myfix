services:
  hunyuanocr-local-server:
    image: local/llama.cpp:server-cuda-b8672
    pull_policy: never
    container_name: hunyuanocr-local-server
    restart: unless-stopped
    ports:
      - "28080:8080"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../testmodel:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    command:
      - -m
      - /models/HunyuanOCR-BF16.gguf
      - --mmproj
      - /models/mmproj-HunyuanOCR-BF16.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "${LLAMA_CTX_SIZE:-4096}"
      - -np
      - "${LLAMA_N_PARALLEL:-1}"
      - -t
      - "${LLAMA_THREADS:-12}"
      - --cache-ram
      - "0"
      - --n-gpu-layers
      - "${LLAMA_N_GPU_LAYERS:-99}"
