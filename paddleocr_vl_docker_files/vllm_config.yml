# Optional backend_config template for the official PaddleOCR genai_server.
# The tracked docker-compose.yaml does not mount this file by default.
#
# Use this only if the official defaults fail to start in your environment
# or after the direct /v1 path has passed the 30-image regression suite.
# Keys follow the official PaddleOCR backend_config format.

gpu-memory-utilization: 0.7
max-model-len: 4096
max-num-seqs: 16
max-num-batched-tokens: 16384
enable-prefix-caching: false
mm-processor-cache-gb: 0
