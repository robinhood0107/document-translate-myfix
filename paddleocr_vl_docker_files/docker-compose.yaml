services:
  paddleocr-vl-genai:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu-offline
    container_name: paddleocr-vl-genai
    restart: unless-stopped
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      PYTHONUNBUFFERED: "1"
    gpus: all
    network_mode: host
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8118/v1/models', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 20
    command: >
      bash -lc "set -euo pipefail &&
      paddleocr genai_server
      --model_name PaddleOCR-VL-1.5-0.9B
      --backend vllm
      --host 0.0.0.0
      --port 8118"
