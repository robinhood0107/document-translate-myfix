services:
  # Gemma 4 로컬 번역 서버 기본 설정입니다.
  # 응답이 잘리면 LLAMA_CTX_SIZE를 올리거나 앱의 Chunk Size를 낮추세요.
  gemma-local-server:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    pull_policy: always
    container_name: gemma-local-server
    restart: unless-stopped
    ports:
      - "18080:8080"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./testmodel:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    command:
      - -m
      - /models/${LLAMA_MODEL_FILE:-gemma-4-26B-IQ4_NL.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "${LLAMA_CTX_SIZE:-4096}"
      - -np
      - "${LLAMA_N_PARALLEL:-1}"
      - -t
      - "${LLAMA_THREADS:-10}"
      - --n-gpu-layers
      - "${LLAMA_N_GPU_LAYERS:-23}"
      - --swa-full
      - --reasoning
      - "off"
      - --reasoning-budget
      - "0"
      - --reasoning-format
      - "none"
